<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enrollment - Software Engineering 2</title>
    <link rel="stylesheet" href="/styles/style.css" />
  </head>
  <body>
    <form class="retro-form" action="#" method="POST" id="contact">
      <h1 class="main-heading">Enrollment - Software Engineering 2</h1>
      <div class="gif-wrapper">
        <img src="gifs/email.gif" alt="retro computer" class="retro-gif" />
      </div>

      <label for="name">Full Name:</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email Address:</label>
      <input type="email" id="email" name="email" required />

      <label for="phone">Phone Number:</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        pattern="[0-9]{10}"
        placeholder="E.g., 0991234567"
        required
      />

      <label for="studentId">Student ID:</label>
      <input type="text" id="studentId" name="studentId" required />

      <label for="modality">Preferred Modality:</label>
      <select id="modality" name="modality" required>
        <option value="">-- Select an option --</option>
        <option value="in-person">In-person</option>
        <option value="online">Online</option>
        <option value="hybrid">Hybrid</option>
      </select>

      <button type="submit">Enroll</button>
    </form>
    <script src="/scripts/form-script.js"></script>
  </body>
</html>
