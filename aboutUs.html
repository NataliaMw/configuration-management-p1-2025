<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sobre Nosotros</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .about-section {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      background-color: #f4f4f4;
    }

    .about-image {
      flex: 0 0 150px;
      margin-right: 40px;
    }

    .about-image img {
      width: 150px;
      height: auto;
      border-radius: 10px;
    }

    .about-text {
      max-width: 600px;
    }

    .about-text h2 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    .about-text p {
      font-size: 18px;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .about-section {
        flex-direction: column;
        text-align: center;
      }

      .about-image {
        margin-right: 0;
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>

  <section class="about-section" id="about">
    <div class="about-image">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRV9BMVrRRy0xnXK4jUbw3llEpZ2A2qkBzqWg&s" alt="Cacao">
    </div>
    <div class="about-text">
      <h2>Sobre Nosotros</h2>
      <p>
        Somos un grupo de desarrollo dedicado a la producción y comercialización de software de alta calidad. Nuestra misión es crear un aplicativo para la feria Chokao, siguiendo los estándares de programación.
      </p>
