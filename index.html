<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="Juan Pablo Plúas Muñoz" content="Untree.co" />
    <link rel="shortcut icon" href="favicon.png" />

    <meta name="description" content="" />
    <meta name="keywords" content="bootstrap, bootstrap4" />

    <!-- Bootstrap CSS -->
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="css/tiny-slider.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
    <title>Belleza Suprema</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/main.js" defer></script>
  </head>

  <body>
    <button onclick="topFunction()" id="scrollTop" title="Go to top">
      <i class="fas fa-arrow-up"></i>
    </button>
    <!-- Start Header/Navigation -->
    <nav
      class="custom-navbar navbar navbar navbar-expand-md navbar-dark bg-dark"
      arial-label="Furni navigation bar"
    >
      <div class="container">
        <a class="navbar-brand" href="index.html"
          >Belleza Extrema<span>.</span></a
        >

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarsFurni"
          aria-controls="navbarsFurni"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarsFurni">
          <ul class="custom-navbar-nav navbar-nav ms-auto mb-2 mb-md-0">
            <li class="nav-item active">
              <a class="nav-link" href="#">Inicio</a>
            </li>
            <li><a class="nav-link" href="#productos">Productos</a></li>
            <li><a class="nav-link" href="#testimonios">Testimonios</a></li>
            <li><a class="nav-link" href="#footer">Contacto</a></li>
          </ul>

          <ul class="custom-navbar-cta navbar-nav mb-2 mb-md-0 ms-5">
            <li>
              <a class="nav-link" onclick="userAlert()"><img src="images/user.svg" /></a>
            </li>
            <li>
              <a class="nav-link" onclick="shopAlert2()"
                ><img src="images/cart.svg"
              /></a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- End Header/Navigation -->

    <!-- Start Hero Section -->
    <div class="hero">
      <div class="container">
        <div class="row justify-content-between">
          <div class="col-lg-7">
            <div class="hero-img-wrap">
              <img
                src="https://content.app-sources.com/s/53118190821339987/uploads/Wellness/wellness-1675474.png?format=webp"
                class="img-fluid"
                style="height: 450px !important;"
              />
            </div>
          </div>
          <div class="col-lg-5">
            <div class="intro-excerpt">
              <h1>Bienvenidos</h1>
              <p class="mb-4">
                Tu tienda de productos de belleza de alta calidad.
              </p>
              <p>
                <a onclick="shopAlert2()" class="btn btn-secondary me-2">Comprar ahora</a
                ><a href="#productos" class="btn btn-white-outline">Explorar</a>
              </p>
            </div>
          </div>
          
        </div>
      </div>
    </div>
    <!-- End Hero Section -->

    
    
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/tiny-slider.js"></script>
    <script src="js/custom.js"></script>
  </body>
</html>
